        /* 1. 기본 레이아웃 및 지도 설정 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100vw; height: 100vh; background: #f0f0f0; }

        /* 2. 마인크래프트 스타일 UI */
        .leaflet-popup-content-wrapper {
            background: #C6C6C6 !important;
            border: 3px solid #000000 !important;
            box-shadow: inset -4px -4px 0px #555555, inset 4px 4px 0px #ffffff !important;
            border-radius: 0px !important;
        }
        .leaflet-popup-tip-container { display: none; } 
        .leaflet-popup-content { margin: 12px 15px !important; color: #3F3F3F !important; font-weight: bold; text-shadow: 1px 1px 0px #ffffff; }

        .custom-tooltip {
            background: #C6C6C6 !important;
            border: 3px solid #000000 !important;
            box-shadow: inset -3px -3px 0px #555555, inset 3px 3px 0px #ffffff !important;
            border-radius: 0px !important;
            color: #3F3F3F !important; font-weight: bold !important; text-shadow: 1px 1px 0px #ffffff;
            padding: 5px 10px !important; opacity: 1 !important;
        }
        .custom-tooltip:before { display: none !important; }

        /* 레이어 컨트롤 커스텀 */
        .leaflet-control-layers {
            width: 180px; background: #C6C6C6 !important; border: 3px solid #000 !important;
            box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff !important;
            border-radius: 0px !important; padding: 10px;
        }
        .leaflet-control-layers-overlays { font-size: 14px; font-weight: bold; max-height: 400px; overflow-y: auto; }
        .leaflet-control-layers-overlays::-webkit-scrollbar { width: 12px; }
        .leaflet-control-layers-overlays::-webkit-scrollbar-track { background: #313131; border: 2px solid #000; }
        .leaflet-control-layers-overlays::-webkit-scrollbar-thumb { background: #8B8B8B; border: 2px solid #ffffff; box-shadow: inset -3px -3px 0px #404040; }

        /* 정보 패널 */
        .info-panel {
            position: absolute; top: 100px; left: 20px; z-index: 3000;
            background: #C6C6C6 !important; padding: 15px; border: 3px solid #000 !important;
            box-shadow: inset -4px -4px 0px #555555, inset 4px 4px 0px #ffffff !important;
            min-width: 250px; display: none;
        }
        .info-panel button {
            margin-top: 15px; cursor: pointer; width: 100%; padding: 8px;
            background: #C6C6C6; border: 2px solid #000;
            box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff;
            color: #3F3F3F; font-weight: bold;
        }

        /* 메뉴 라벨 및 검색 UI */
        .hunt-group-label { color: #e74c3c; border-bottom: 2px solid #e74c3c; display: block; margin-top: 10px; margin-bottom: 5px; }
        .herb-group-label { color: #8e44ad; border-bottom: 2px solid #8e44ad; display: block; margin-top: 10px; margin-bottom: 5px; }
        .mine-group-label { color: #27ae60; border-bottom: 2px solid #27ae60; display: block; margin-top: 10px; margin-bottom: 5px; }
        .divider-line { border-bottom: 1px solid #ccc; display: block; margin: 5px 0; }
        
        .hunt-name-clickable { cursor: pointer; }
        .hunt-name-clickable:hover { text-decoration: underline; }

        #search-container input { background: #000; color: #fff; border: 2px solid #fff; padding: 10px 15px; font-size: 16px; outline: none; }
        #search-container button { background: #C6C6C6; color: #3F3F3F; border: 3px solid #000; box-shadow: inset -4px -4px 0px #555555, inset 4px 4px 0px #ffffff; font-weight: bold; padding: 10px 20px; cursor: pointer; }

        /* 마커 아이콘 스타일 */
        .mine-clickable-area { display: flex; justify-content: center; align-items: center; }
        .mine-dot { width: 14px; height: 14px; border: 1px solid #000; box-shadow: inset -1px -1px 0px #555, inset 1px 1px 0px #fff; }
        .stele-body { width: 20px; height: 28px; background: #8B8B8B; border: 2px solid #000; box-shadow: inset -3px -3px 0px #555555, inset 3px 3px 0px #ffffff; }

        /* 약초 들여쓰기 */
        .leaflet-control-layers-overlays label:has(.herb-name-clickable) { padding-left: 25px !important; display: block; margin-bottom: 2px; }
        .leaflet-control-layers-overlays label:has(.herb-name-clickable) input,
        .leaflet-control-layers-overlays label:has(.herb-group-label) input,
        .leaflet-control-layers-overlays label:has(.hunt-group-label) input,
        .leaflet-control-layers-overlays label:has(.mine-group-label) input,
        .leaflet-control-layers-overlays label:has(.divider-line) input { display: none !important; }

        @media (max-width: 767px) {
            .leaflet-control-layers-expanded { max-height: 60vh !important; overflow-y: auto; width: 180px !important; font-size: 12px; }

            .leaflet-control-layers-overlays label:has(.herb-name-clickable) { padding-left: 15px !important; }
        }
    </style>

// 사냥터 정보창 표시 함수 (구조 복구 기능 추가)
function showHuntingInfo(info) {
    var panel = document.getElementById('hunting-info-panel');
    
    // 1. 패널 내부 구조가 깨져있을 경우를 대비해 기본 틀을 강제로 다시 구성합니다.
    panel.innerHTML = `
        <h4 id="panel-name" style="margin: 0;"></h4>
        <div id="panel-lv"></div>
        <button onclick="document.getElementById('hunting-info-panel').style.display='none'" 
                style="margin-top: 15px; cursor: pointer; width: 100%; padding: 8px; background: #C6C6C6; border: 2px solid #000; box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff; color: #3F3F3F; font-weight: bold;">
            닫기
        </button>
    `;

    // 2. 이제 안전하게 데이터를 주입합니다.
    document.getElementById('panel-name').innerHTML = `
        <span style="font-size: 24px;"><b>${info.name}</b></span> 
        <span style="font-size: 16px; color: #666;">(${info.lv})</span>
    `;
    document.getElementById('panel-lv').innerHTML = `
        <div style="margin-top: 8px; font-size: 16px; color: #444;">${info.monsters}</div>
    `;
    
    // 3. 패널 보이기
    panel.style.display = 'block';
}

        // 사냥터 클릭 이동 로직
        window.moveAndShowHunt = function(name) {
            var info = huntingInfo.find(h => h.name === name);
            if (!info) return;
            if (!map.hasLayer(huntingLayers[name])) {
                map.addLayer(huntingLayers[name]);
                updateLayerCheckbox(name, true);
            }
            map.setView(info.center, -1);
            setTimeout(() => showHuntingInfo(info), 100); 
        };

        // 사냥터 목록 생성
        function generateHuntingList() {
            const listElement = document.getElementById('hunting-list');
            huntingInfo.forEach(info => {
                const li = document.createElement('li');
                li.style.margin = "5px 0"; li.style.padding = "5px"; li.style.borderBottom = "1px solid #888";
                li.innerHTML = `<span class="hunt-name-clickable" style="font-size: 14px; display: block;" onclick="moveAndShowHunt('${info.name}')">${info.name} <small style="color:#666;">(${info.lv})</small></span>`;
                listElement.appendChild(li);
            });
        }

        // 레이어 체크박스 동기화
        function updateLayerCheckbox(name, isAdd) {
            document.querySelectorAll('.leaflet-control-layers-overlays label').forEach(label => {
                if (label.innerText.trim().includes(name)) {
                    var cb = label.querySelector('input');
                    if (cb) cb.checked = isAdd;
                }
            });
        }

// 약초 전용 정보 표시 함수 수정본
window.moveAndShowHerb = function(name, mcX, mcZ, color, coords) {
    // 1. 해당 약초 레이어가 꺼져있다면 켜기
    if (!map.hasLayer(herbLayers[name])) {
        map.addLayer(herbLayers[name]);
    }

    // 2. 패널 가져오기 및 사냥터용 기본 구조 초기화 (중요!)
    var panel = document.getElementById('hunting-info-panel');
    
    // 이 부분이 핵심입니다: 약초 정보로 덮어쓰기 전에 
    // 나중에 사냥터를 클릭했을 때 오류가 나지 않도록 기본 틀을 먼저 넣어줍니다.
    panel.innerHTML = `
        <h4 id="panel-name" style="margin: 0;"></h4>
        <div id="panel-lv"></div>
        <div id="herb-detail-content"></div> 
        <button onclick="document.getElementById('hunting-info-panel').style.display='none'">닫기</button>
    `;

    // 3. 약초 데이터 필터링 및 HTML 생성
    var allLocations = herbData.filter(h => h.name === name);
    var coordsHtml = allLocations.map(h => `
        <div style="margin-bottom:5px;">
            <span style="background:#444; color:#fff; padding:2px 5px; border-radius:3px; font-size:11px; margin-right:5px;">좌표</span>
            <b style="color:#e74c3c;">X: ${h.mcX} / Z: ${h.mcZ}</b>
        </div>
    `).join('');

    var rareHerbs = ["월계엽", "철목영지", "금향과", "빙백설화"];
    var isRare = rareHerbs.includes(name);
    var titleExtraHtml = isRare ? ` <span style="color:#e74c3c; font-size:14px;">(희귀)</span>` : "";
    var descExtraHtml = isRare 
        ? `<div style="font-size:9px; color:#555; margin-top:2px;">희귀 약초는 광범위하게 스폰됩니다.</div>`
        : `<div style="font-size:9px; color:#e74c3c; margin-top:2px; font-weight:bold;">위 좌표들은 명확하지 않을 수 있습니다.</div>`;

    // 4. 정보창 표시 및 약초 전용 UI 주입
    panel.style.display = 'block';
    
    // 전체를 덮어쓰는 대신, 약초 전용 디자인을 panel에 직접 주입합니다.
    panel.innerHTML = `
        <div style="border-bottom:3px solid ${color}; padding-bottom:8px; margin-bottom:12px; position:relative;">
            <b style="font-size:18px; color:#3F3F3F; text-shadow:1px 1px 0px #fff;">${name}</b>${titleExtraHtml}
            ${descExtraHtml}
            <span style="position:absolute; right:0; top:0; cursor:pointer; font-weight:bold; padding:5px;" onclick="document.getElementById('hunting-info-panel').style.display='none'">X</span>
        </div>
        <div style="font-size:14px; line-height:1.6; background:rgba(255,255,255,0.5); padding:10px; border:1px solid #888; max-height:150px; overflow-y:auto;">
            ${coordsHtml}
        </div>
        <button onclick="document.getElementById('hunting-info-panel').style.display='none'" 
                style="margin-top:12px; width:100%; cursor:pointer; background:#C6C6C6; border:2px solid #000; box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff; font-weight:bold; padding:5px;">
            닫기
        </button>
    `;
};

// 모든 약초 레이어 초기화 함수
window.resetHerbLayers = function() {

        }

    document.getElementById('hunting-info-panel').style.display = 'none';

        // 검색 실행 함수 (수정 완료)
        window.executeSearch = function() {
            var input = document.getElementById('search-input');
            var query = input.value.trim();
            if (!query) return;

            var found = false;
            var target = null;
            var targetMarker = null;

            // 1. 사냥터 검색
            huntingInfo.forEach(function(info) {
                if (info.name.includes(query)) {
                    target = info.center; 
                    found = true;
                    if (!map.hasLayer(huntingLayers[info.name])) { 
                        map.addLayer(huntingLayers[info.name]); 
                        updateLayerCheckbox(info.name, true); 
                    }
                    setTimeout(() => showHuntingInfo(info), 100);
                }
            });

            // 2. 광산(poiData) 검색
            if (!found) {
                var exactMatch = poiData.find(p => p.name === query);
                if (exactMatch) {
                    var poi = exactMatch;
                    target = poi.coords; 
                    found = true;
                    var key = (poi.type === '스폰') ? '스폰' : (poi.type === '녹') ? '녹색광산' : (poi.type === '청') ? '청색광산' : (poi.type === '황') ? '황색광산' : (poi.type === '적') ? '적색광산' : null;
                    if (key) {
                        if (!map.hasLayer(poiLayers[key])) { 
                            map.addLayer(poiLayers[key]); 
                            updateLayerCheckbox(key, true); 
                        }
                        poiLayers[key].eachLayer(function(l) { 
                            if (l instanceof L.Marker && l.getLatLng().equals(target)) targetMarker = l; 
                        });
                    }
                }
            }

            // 3. 약초 검색
            if (!found) {
                herbData.forEach(function(herb) {
                    if (!found && herb.name.includes(query)) {
                        target = herb.coords; 
                        found = true;
                        if (!map.hasLayer(herbLayers[herb.name])) { 
                            map.addLayer(herbLayers[herb.name]); 
                            updateLayerCheckbox(herb.name, true); 
                        }
                        herbLayers[herb.name].eachLayer(function(l) { 
                            if (l instanceof L.Marker && l.getLatLng().equals(target)) targetMarker = l; 
                        });
                    }
                });
            }

            if (found && target) { 
                map.setView(target, -1); 
                if (targetMarker) targetMarker.openPopup(); 
                input.value = ""; 
            } else { 
                alert("검색 결과가 없습니다."); 
            }
        };

        // 관리 함수들
        window.resetHuntingLayers = function() {
            Object.keys(huntingLayers).forEach(name => {
                if (map.hasLayer(huntingLayers[name])) map.removeLayer(huntingLayers[name]);
                updateLayerCheckbox(name, false);
            });
        };
        window.toggleHuntingList = function() {
            var content = document.getElementById('hunting-content'), icon = document.getElementById('toggle-icon');
            if (content.style.display === "none") { content.style.display = "block"; icon.innerText = "▲"; } 
            else { content.style.display = "none"; icon.innerText = "▼"; }
        };
        window.resetHerbLayers = function() {
            Object.keys(herbLayers).forEach(name => { if (map.hasLayer(herbLayers[name])) map.removeLayer(herbLayers[name]); });
        };

        /** 8. 초기 실행 **/
        poiLayers['스폰'].addTo(map);
        poiLayers['십이간지'].addTo(map);
        mountainLayers.addTo(map);
        generateHuntingList();
        L.control.mousePosition({ position: 'bottomleft', separator: ', ', prefix: '좌표: ' }).addTo(map);
        window.addEventListener('resize', () => map.invalidateSize());

    </script>
</body>
</html>
